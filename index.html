<body>

  <nav>

  <header>
    <span class="tag">// Data & IT Analyst</span>
    <h1>Fiyinfoluwa Openiyi Kayejo</h1>
    <p><span id="typed"></span><span class="cursor"></span></p>
  </header>

  <footer>
    <span class="live-dot"></span>© 2026 Your Name · Built with HTML & CSS
  </footer>

  <script>
    const phrases = [
      "Turning raw data into decisions",
      "IT Systems · Networking · Support"
    ];
    let i = 0, j = 0, deleting = false;
    const el = document.getElementById("typed");
    function type() {
      const word = phrases[i];
      el.textContent = deleting ? word.substring(0, j--) : word.substring(0, j++);
      if (!deleting && j === word.length + 1) {
        deleting = true;
        setTimeout(type, 1800);
        return;
      }
      if (deleting && j === 0) {
        deleting = false;
        i = (i + 1) % phrases.length;
      }
      setTimeout(type, deleting ? 50 : 90);
    }
    type();
  </script>

</body>
